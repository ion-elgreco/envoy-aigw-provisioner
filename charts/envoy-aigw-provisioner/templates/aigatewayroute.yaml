{{- range $i, $route := .Values.routes }}
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: {{ $route.name | default (printf "%s-%d" (include "ai-gateway.name" $) (add $i 1)) }}
  namespace: {{ include "ai-gateway.namespace" $ }}
  labels:
{{ include "ai-gateway.labels" $ | indent 4 }}
spec:
  schema:
    name: {{ $route.schemaName | default "OpenAI" }}
  targetRefs:
    - name: {{ $route.gatewayName | default $.Values.gateway.name | default (include "ai-gateway.name" $) }}
      kind: Gateway
      group: gateway.networking.k8s.io
{{- if $route.rules }}
  rules:
{{- range $route.rules }}
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: {{ .model }}
      backendRefs:
{{ toYaml .backendRefs | indent 8 }}
      {{- if .timeouts }}
      timeouts:
        {{- if .timeouts.request }}
        request: {{ .timeouts.request }}
        {{- end }}
        {{- if .timeouts.backendRequest }}
        backendRequest: {{ .timeouts.backendRequest }}
        {{- end }}
      {{- end }}
{{- end }}
{{- end }}
---
{{- end }}
